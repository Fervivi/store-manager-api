# (loads the .env file)
spring.config.import=optional:file:.env[.properties], optional:classpath:metadata.properties

spring.application.name=${SPRING_APP_NAME}
spring.profiles.active=${SPRING_ENV}
eureka.client.service-url.defaultZone=${SPRING_EUREKA_URL}

management.endpoints.web.exposure.include=health,info

# External Microservices
app.service.products.base-url=${SERVICE_PRODUCTS_BASE_URL}
app.service.carts.base-url=${SERVICE_CARTS_BASE_URL}
